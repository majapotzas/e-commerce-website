<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Green Olives</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/product.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="product-page">
      <section class="product-main-row">
        <div class="product-card image-container">
          <img src="images/olives.jpg" alt="Gorgeous Green Olives" />
        </div>

        <div class="info-column">
          <div class="product-card details-box">
            <h1 class="display-font">OLIVES</h1>
            <div class="specs">
              <div class="nutrition">
                <h3>NUTRITION FACTS</h3>
                <ul>
                  <li>Vibes: 100%</li>
                  <li>Sodium: Bold</li>
                  <li>Energy: High</li>
                </ul>
              </div>
              <div class="story">
                <h3>WHERE DO WE COME FROM?</h3>
                <p class="body-font">
                  Grown under the Mediterranean sun and made to bring people
                  together. Salty, bold, and ready for the table.
                </p>
              </div>
            </div>
          </div>

          <div class="product-card purchase-box">
            <div class="price-qty-row">
              <div class="qty-control">
                <button class="qty-btn">-</button>
                <span class="qty-num">1</span>
                <button class="qty-btn">+</button>
              </div>
              <p class="price-text">35 SEK</p>
            </div>
            <button class="add-to-cart-btn">ADD TO GROCERY LIST</button>
          </div>
        </div>
      </section>

      <div class="disco-divider"></div>

      <section class="related-section">
        <h2 class="display-font">You might also like:</h2>
        <div class="recommendation-grid">
          <div class="mini-card">
            <img src="images/an-4-redwine.jpg" alt="Wine" />
          </div>
          <div class="mini-card">
            <img src="images/truffle-crisps.jpg" alt="Crisps" />
          </div>
          <div class="mini-card">
            <img src="images/prosciutto.jpg" alt="Meat" />
          </div>
          <div class="mini-card"></div>
        </div>
      </section>
    </main>
  </body>
</html>
